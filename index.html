<!DOCTYPE html>
<html>
<head>
    <title>AI Blog Title Generator</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            margin-top: 70px;
            color: white;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        input, select {
            width: 90%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            font-size: 15px;
        }

        button {
            background: #667eea;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            margin: 5px;
        }

        button:hover {
            background: #5a67d8;
        }

        #result {
            margin-top: 20px;
            text-align: left;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin-bottom: 12px;
        }

        /* Loading Spinner */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>
</head>

<body>

    <div class="container">
        <div class="title">AI Blog Title Generator</div>

        <input type="text" id="topic" placeholder="Enter topic...">

        <select id="style">
            <option value="normal">Normal</option>
            <option value="funny">Funny</option>
            <option value="professional">Professional</option>
            <option value="clickbait">Clickbait</option>
        </select>

        <button onclick="generateTitles()">Generate</button>
        <button onclick="copyText()">Copy</button>

        <div id="result"></div>
    </div>

    <script>
        async function generateTitles() {
            let topic = document.getElementById("topic").value;
            let style = document.getElementById("style").value;

            if (!topic) {
                alert("Enter a topic!");
                return;
            }

            // Loader
            document.getElementById("result").innerHTML = "<div class='loader'></div>";

            let response = await fetch("http://127.0.0.1:5000/generate", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                // style backend ku send pannuvom but display la show panna matom
                body: JSON.stringify({ topic: topic})
            });

            let data = await response.json();

            if (data.titles) {
                let titlesArray = data.titles.split("\n");

                let output = "<ul>";
                titlesArray.forEach(title => {
                    if (title.trim() !== "") {
                        output += "<li>" + title + "</li>";
                    }
                });
                output += "</ul>";

                document.getElementById("result").innerHTML = output;
            } else {
                document.getElementById("result").innerText = "Error!";
            }
        }

        function copyText() {
            let text = document.getElementById("result").innerText;
            navigator.clipboard.writeText(text);
            alert("Copied!");
        }
    </script>

</body>
</html>
